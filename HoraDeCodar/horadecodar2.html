<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hora de Codar 2</title>
</head>
<body>
    <script>
        //---- exercício 1 ----
        var valor1 = Number(prompt("Informe um número: "))
        var valor2 = Number(prompt("Informe outro número: "))

        if(valor1 > valor2){
            alert(valor1)
        } else if(valor1 < valor2){
            alert(valor2)
        }else if(valor1 == valor2){
            alert("são iguais")
        }else{
            alert("inválido")
        }

        //---- exercício 2 ----
        var valor1 = (prompt("Informe um número: "))

        if(valor1 > 0){
            alert(valor1 + " é positivo.")
        } else if(valor1 < 0){
            alert(valor1 + " é negativo.")
        }else{
            alert(valor1 + " é igual a zero.")
        }

        //---- exercício 3 ----
        var valores = [1, 362, 84]

        alert("valores: " + valores)
        valores.sort((a, b) => a - b);
        alert(valores[2])

        //---- exercício 4 ----
        valores = []
        for( let i = 0; i < 3; i++){
            valor = Number(prompt("insira um número: "))
            valores.push(valor)
        }

        alert("valores: " + valores)
        alert(valores[1] + valores[2])

        //---- exercicio 5 ----
        valores = []
        for( let i = 0; i < 6; i++){
            valor = Number(prompt("insira um número: "))
            valores.push(valor)
        }

        alert("valores: " + valores)
        var soma = valores.reduce((acc, num) => {
            return acc + num
        }, 0)
        alert(soma / valores.length)

        //---- exercicio 6 ----
        valores = []
        for( let i = 0; i < 4; i++){
            valor = Number(prompt("insira um número: "))
            valores.push(valor)
        }
        
        alert("primeiro valor: " + valores[0])
        alert("ultimo valor: " + valores[3])

        valores.sort((a, b) => a - b);
        alert("maior valor: " + valores[3])

        //---- exercicio 7 ----
        valores_menor72 = []
        valores_maior72 = []
        for( let i = 0; i < 4; i++){
            valor = Number(prompt("insira um número: "))
            if(valor < 72){
                valores_menor72.push(valor)
            }else{
                valores_maior72.push(valor)
            }
        }
        var soma = valores_menor72.reduce((acc, num) => {
            return acc + num
        }, 0)
        alert("soma dos números menores que 72: " + soma)
        alert("números maiores que 72: " + valores_maior72)

        //---- exercicio 8 ----
        valores = []
        for( let i = 0; i < 4; i++){
            nota = Number(prompt("insira um número: "))
            if(nota >= 0 && nota <= 10){
                valores.push(nota)
            }else{
                alert("nota invalida")
            }
        }
        var soma = valores.reduce((acc, num) => {
            return acc + num
        }, 0)
        media = soma / valores.length
        if(media >5){
            alert("Você passou no teste!!")
        }else{
            alert("Tente novamente")
        }

        //---- exercício 9 ----

        ano = Number(prompt("Insira seu ano de nascimento: "))
        idade = 2026 - ano
        if(idade <= 70 && idade >= 18){
            alert("Seu voto é obrigatório.")
        }
        else if(idade > 0 || idade > 125){
            alert("Seu voto não é obrigatório.")
        }else{
            alert("Data inválida.")
        }

        //---- exercício 10 ----
        altura = Number(prompt("Insira a altura: "))
        genero = Number(prompt("Insira o gênero: 1 = Feminino / 2 = Masculino"))
        if(genero == 1){
            alert((62.1 * altura) - 44.7 + "kg é o peso ideal")
        }else if(genero == 2){
            alert((72.7 * altura) - 58 + "kg é o peso ideal")
        }else{
            alert("Dados inválidos.")
        }

        //---- exercício 11 ----
        num1 = Number(prompt("Insira um número inteiro: "))
        num2 = Number(prompt("Insira outro número inteiro: "))
        op = Number(prompt("Escolha uma operação: 1-Adição, 2-Subtração, 3-Divisão, 4-Multiplicação"))
        if(op == 1){
            alert(num1 + num2)
        }else if(op == 2){
            alert(num1 - num2)
        }else if(op == 3){
            alert(num1 / num2)
        }else if(op == 4){
            alert(num1 * num2)
        }else{
            alert("Inválido.")
        }


    </script>
</body>
</html>
